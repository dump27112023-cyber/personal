name: Update file from URL

on:
  schedule:
    - cron: "*/30 * * * *"  # mỗi 30 phút
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data
        run: |
          curl -L "https://tinyurl.com/buncha2" -o mytv

      - name: Commit & push nếu có thay đổi
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add mytv
          git diff --quiet && git diff --staged --quiet || git commit -m "auto update"
          git push
