name: Update file from URL

on:
  schedule:
    - cron: "0 */2 * * *"  # mỗi 30 phút
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Fetch data
        run: |
          curl -L --fail --retry 3 --retry-delay 5 "https://tinyurl.com/buncha2" -o mytv

      - name: Commit & push nếu có thay đổi
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add mytv
          if git diff --cache --quiet; then
            echo "No changes."
          else
            git commit -m "auto update"
            git push
          fi
